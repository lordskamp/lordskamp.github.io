name = "kobza-leaderboard"
main = "api/kobza-leaderboard-worker.js"
compatibility_date = "2026-07-14"

[[kv_namespaces]]
binding = "KOBZA_LEADERBOARD"
id = "bb42315f5c53487cbe7d99fb583b4713"

[[d1_databases]]
binding = "SHYFR_STATE"
database_name = "shyfr-state"
database_id = "c0618a51-2a0b-4b68-b131-da717a07b1fa"
migrations_dir = "migrations/shyfr"

[vars]
SHYFR_MINI_APP_URL = "https://lordskamp.github.io/shyfr/"
SHYFR_CONTENT_BASE_URL = "https://lordskamp.github.io/content/shyfr"
SHYFR_CONTENT_CACHE_SECONDS = "60"
SHYFR_PAYMENT_SUPPORT = "@lordskamp"
SHYFR_DAILY_LIVES = "4"
SHYFR_DAILY_HINTS = "3"
SHYFR_CATEGORY_PRICE_STARS = "200"
SHYFR_LEVEL_PRICE_STARS = "10"
SHYFR_LIVES_PACK_STARS = "30"
SHYFR_HINTS_PACK_QUANTITY = "5"
SHYFR_HINTS_PACK_STARS = "20"
