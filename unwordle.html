<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#8c3dc1">
    <meta name="kobza-leaderboard-endpoint" content="">
    <title>КОБЗА-НАВПАКИ | Lordskamp</title>
    <meta name="description" content="Українська reverse Wordle-гра.">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="apple-touch-icon" sizes="180x180" href="fav/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="fav/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="fav/favicon-16x16.png">
    <link rel="shortcut icon" href="fav/favicon.ico">
    <link rel="stylesheet" href="site-ui.css?v=20260611-light-contrast">
    <link rel="stylesheet" href="unwordle.css?v=20260703-tabs">
    <script defer src="site-ui.js?v=20260703-clean-urls"></script>
    <script defer src="unwordle.js?v=20260703-leaderboard"></script>
</head>

<body>
    <div class="gradient-background" aria-hidden="true">
        <div class="gradient-sphere sphere-1"></div>
        <div class="gradient-sphere sphere-2"></div>
        <div class="gradient-sphere sphere-3"></div>
        <div class="gradient-sphere sphere-4"></div>
        <div class="glow"></div>
        <div class="grid-overlay"></div>
    </div>

    <main class="content-wrapper unwordle-shell">
        <div id="siteHeaderMount" data-site-page="unwordle" data-force-language="uk"></div>

        <section class="unwordle-card" aria-labelledby="gameTitle">
            <header class="unwordle-topbar">
                <div class="unwordle-icon-group">
                    <button class="unwordle-icon-button" id="helpButton" type="button" data-brand="KobzaReverse" aria-label="Як грати">
                        <i class="fas fa-circle-question" aria-hidden="true"></i>
                    </button>
                </div>

                <div class="unwordle-heading">
                    <h1 id="gameTitle">КОБЗА-НАВПАКИ</h1>
                </div>

                <div class="unwordle-icon-group unwordle-icon-group--right">
                    <button class="unwordle-icon-button" id="leaderboardButton" type="button" data-brand="KobzaReverse" aria-label="Рейтинг">
                        <i class="fas fa-chart-simple" aria-hidden="true"></i>
                    </button>
                </div>
            </header>

            <nav class="mode-tabs" aria-label="Режим гри">
                <button class="mode-tab is-active" type="button" data-mode="daily" data-brand="KobzaReverse">Щоденна</button>
                <span class="tab-separator" aria-hidden="true">·</span>
                <button class="mode-tab" type="button" data-mode="unlimited" data-brand="KobzaReverse">Нескінченна</button>
            </nav>

            <div class="difficulty-tabs" aria-label="Складність">
                <button class="difficulty-tab" type="button" data-difficulty="easy" data-brand="KobzaReverse">Легка</button>
                <span class="tab-separator" aria-hidden="true">·</span>
                <button class="difficulty-tab is-active" type="button" data-difficulty="normal" data-brand="KobzaReverse">Звичайна</button>
                <span class="tab-separator" aria-hidden="true">·</span>
                <button class="difficulty-tab" type="button" data-difficulty="hard" data-brand="KobzaReverse">Складна</button>
            </div>

            <div class="game-status" id="gameStatus" role="status" aria-live="polite">Завантаження...</div>

            <div class="game-grid" id="gameGrid" aria-label="Сітка Кобза-навпаки"></div>

            <div class="game-actions">
                <button class="game-action" id="solveButton" type="button" data-brand="KobzaReverse">Розв’язок</button>
                <button class="game-action game-action--primary" id="newPuzzleButton" type="button" data-brand="KobzaReverse">Нова гра</button>
                <div class="daily-timer" id="dailyTimer" hidden>
                    <span class="daily-timer__label">Час</span>
                    <strong id="dailyTimerValue">0:00</strong>
                    <button class="daily-timer__pause" id="pauseTimerButton" type="button" data-brand="KobzaReverse">
                        <i class="fas fa-pause" aria-hidden="true"></i>
                        <span>Пауза</span>
                    </button>
                </div>
            </div>

            <div class="next-puzzle" id="nextPuzzleCountdown" hidden></div>

            <div class="ukrainian-keyboard" id="keyboard" aria-label="Українська клавіатура"></div>
        </section>

        <footer class="unwordle-footer">
            <a href="https://github.com/kobzaapp/kobzadict" target="_blank" rel="noopener">Словник Kobza</a>
            <span>CC BY-NC-SA</span>
        </footer>
    </main>

    <div class="unwordle-modal" id="helpDialog" role="dialog" aria-modal="true" aria-labelledby="helpTitle" hidden>
        <div class="unwordle-modal__backdrop" data-modal-close></div>
        <section class="unwordle-modal__panel" tabindex="-1">
            <button class="unwordle-modal__close" type="button" data-modal-close aria-label="Закрити">
                <i class="fas fa-times" aria-hidden="true"></i>
            </button>
            <div class="help-content" id="helpContent"></div>
            <div class="modal-nav" id="helpNav"></div>
        </section>
    </div>

    <div class="unwordle-modal" id="leaderboardDialog" role="dialog" aria-modal="true" aria-labelledby="leaderboardTitle" hidden>
        <div class="unwordle-modal__backdrop" data-modal-close></div>
        <section class="unwordle-modal__panel unwordle-modal__panel--leaderboard" tabindex="-1">
            <button class="unwordle-modal__close" type="button" data-modal-close aria-label="Закрити">
                <i class="fas fa-times" aria-hidden="true"></i>
            </button>
            <h2 id="leaderboardTitle">Рейтинг</h2>
            <p class="leaderboard-note" id="leaderboardNote">Рейтинг завантажується.</p>
            <div id="leaderboardContent"></div>
            <div class="modal-nav">
                <button class="modal-link modal-link--muted" id="clearLeaderboardButton" type="button">Очистити</button>
                <span>·</span>
                <button class="modal-link" type="button" data-modal-close>Закрити</button>
            </div>
        </section>
    </div>

    <div class="unwordle-modal" id="nameDialog" role="dialog" aria-modal="true" aria-labelledby="nameTitle" hidden>
        <div class="unwordle-modal__backdrop"></div>
        <section class="unwordle-modal__panel unwordle-modal__panel--name" tabindex="-1">
            <h2 id="nameTitle">Записати результат</h2>
            <p class="leaderboard-note">Введи ім’я для щоденного рейтингу.</p>
            <form class="name-form" id="nameForm">
                <label class="sr-only" for="playerName">Ім’я</label>
                <input id="playerName" name="playerName" type="text" maxlength="24" autocomplete="name" placeholder="Ім’я" required>
                <button class="game-action game-action--primary" type="submit" data-brand="KobzaReverse">Зберегти</button>
            </form>
            <div class="modal-nav">
                <button class="modal-link modal-link--muted" id="skipNameButton" type="button">Пропустити</button>
            </div>
        </section>
    </div>

    <div class="custom-cursor" id="customCursor"></div>
</body>

</html>
