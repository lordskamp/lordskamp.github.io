    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

        /* ── Design System (inherited from index.html) ── */
        :root {
            --red: #8c3dc1;
            --bg: #0a0a0a;
            --text-color: #ffffff;
            --text-muted: #9ca3af;
            --glass: rgba(31, 41, 55, 0.35);
            --glass-border: rgba(140, 61, 193, 0.2);
            --blur: blur(12px);
            --page-bg: radial-gradient(ellipse at bottom, #1a1a1a 0%, var(--bg) 70%);
            --glass-hover: rgba(55, 65, 81, 0.6);
            --border-hover: rgba(140, 61, 193, 0.5);
            --island-bg: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
            --island-border: rgba(255,255,255,0.04);
            --island-shadow: 0 10px 30px rgba(3,7,18,0.6);
            --island-shadow-hover: 0 18px 48px rgba(0,0,0,0.65);
            --grid-size: 50px;
            --bg-overscan: 64px;
            --sphere-blend: screen;
            --particle-color: white;
            --safe-top: env(safe-area-inset-top, 0px);
            --app-height: 100vh;
            --bg-height: 100vh;
            --gap: 1.25rem;
            --inner-gap: 0.75rem;
        }
        :root.light-theme {
            --bg: #f2f4f7;
            --page-bg: radial-gradient(circle at top, #ffffff 0%, #f2f4f7 60%, #e2e8f0 100%);
            --text-color: #0f172a;
            --text-muted: #64748b;
            --glass: rgba(255,255,255,0.25);
            --glass-border: rgba(255,255,255,0.8);
            --glass-hover: rgba(255,255,255,0.5);
            --border-hover: rgba(140,61,193,0.6);
            --sphere-blend: normal;
            --island-bg: linear-gradient(135deg, rgba(255,255,255,0.4), rgba(255,255,255,0.1));
            --island-border: rgba(255,255,255,0.9);
            --island-shadow: 0 10px 40px -10px rgba(0,0,0,0.1), 0 0 20px rgba(255,255,255,0.5) inset;
            --island-shadow-hover: 0 18px 48px rgba(0,0,0,0.08), 0 0 30px rgba(255,255,255,0.6) inset;
            --particle-color: #8c3dc1;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        img {
            -webkit-user-drag: none;
            -khtml-user-drag: none;
            -moz-user-drag: none;
            -o-user-drag: none;
            user-drag: none;
            -webkit-touch-callout: none;
        }
        html {
            height: -webkit-fill-available;
            background: var(--page-bg);
            background-color: var(--bg);
            scroll-behavior: smooth;
        }
        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-color);
            min-height: 100vh;
            overflow-x: hidden;
            background: var(--page-bg);
            background-color: var(--bg);
            transition: color .3s ease, background-color .3s ease;
        }

        /* ── Background (exact match from index.html) ── */
        .gradient-background {
            position: fixed;
            top: calc(-1 * var(--bg-overscan));
            left: 0; width: 100%;
            height: calc(var(--bg-height) + (var(--bg-overscan) * 2));
            min-height: 110vh;
            z-index: 1; overflow: hidden; pointer-events: none;
            background-color: var(--bg);
            transform: translate3d(0,0,0); backface-visibility: hidden;
        }
        .gradient-sphere {
            position: absolute; border-radius: 50%;
            filter: blur(80px); mix-blend-mode: var(--sphere-blend);
            transition: mix-blend-mode .3s ease;
            will-change: transform; contain: strict;
        }
        .sphere-1 { width:50vw;height:50vw;background:linear-gradient(45deg,rgba(255,0,128,.9),rgba(255,60,172,.7),rgba(255,102,0,.5));top:-15%;left:-15%;animation:float-1 6s ease-in-out infinite; }
        .sphere-2 { width:55vw;height:55vw;background:linear-gradient(220deg,rgba(72,0,255,.9),rgba(140,61,193,.7),rgba(0,200,255,.5));bottom:-25%;right:-15%;animation:float-2 8s ease-in-out infinite; }
        .sphere-3 { width:40vw;height:40vw;background:linear-gradient(120deg,rgba(133,89,255,.8),rgba(98,216,249,.6),rgba(0,255,200,.4));top:50%;left:15%;animation:float-3 7s ease-in-out infinite; }
        .sphere-4 { width:35vw;height:35vw;background:linear-gradient(300deg,rgba(255,0,200,.7),rgba(140,61,193,.6),rgba(72,0,255,.4));top:10%;right:20%;animation:float-4 9s ease-in-out infinite; }
        @keyframes float-1{0%,100%{transform:translate(0,0) scale(1) rotate(0deg);opacity:.8}25%{transform:translate(15%,5%) scale(1.15) rotate(90deg);opacity:1}50%{transform:translate(10%,15%) scale(1.1) rotate(180deg);opacity:.9}75%{transform:translate(-5%,10%) scale(1.2) rotate(270deg);opacity:1}}
        @keyframes float-2{0%,100%{transform:translate(0,0) scale(1) rotate(0deg);opacity:.9}33%{transform:translate(-15%,-10%) scale(1.2) rotate(-120deg);opacity:1}66%{transform:translate(5%,-15%) scale(1.1) rotate(-240deg);opacity:.85}}
        @keyframes float-3{0%,100%{transform:translate(0,0) scale(1) rotate(0deg);opacity:.7}20%{transform:translate(-10%,-5%) scale(1.15) rotate(72deg);opacity:.9}40%{transform:translate(5%,-10%) scale(1.1) rotate(144deg);opacity:.8}60%{transform:translate(10%,5%) scale(1.2) rotate(216deg);opacity:1}80%{transform:translate(-5%,10%) scale(1.05) rotate(288deg);opacity:.85}}
        @keyframes float-4{0%,100%{transform:translate(0,0) scale(1) rotate(0deg);opacity:.7}25%{transform:translate(-10%,10%) scale(1.1) rotate(-90deg);opacity:.9}50%{transform:translate(-5%,-10%) scale(1.15) rotate(-180deg);opacity:1}75%{transform:translate(10%,-5%) scale(1.05) rotate(-270deg);opacity:.8}}

        .glow {
            position:absolute;width:40vw;height:40vh;
            background:radial-gradient(circle,rgba(72,0,255,.15),transparent 70%);
            top:50%;left:50%;transform:translate(-50%,-50%);z-index:2;
            animation:pulse 8s infinite alternate;filter:blur(15px);
            contain:strict;will-change:opacity,transform;
        }
        @keyframes pulse{0%{opacity:.3;transform:translate(-50%,-50%) scale(.9)}100%{opacity:.7;transform:translate(-50%,-50%) scale(1.1)}}

        .grid-overlay {
            position:absolute;top:0;left:0;width:100%;height:100%;
            background-size:var(--grid-size) var(--grid-size);
            background-position:center center;
            background-image:
                linear-gradient(to right,#d7e5fa 1px,transparent 1px),
                linear-gradient(to bottom,#d7e5fa 1px,transparent 1px);
            z-index:2;opacity:.64;mix-blend-mode:overlay;contain:strict;
        }
        .noise-overlay { display:none; }

        /* ── Particles ── */
        .particles-container {
            position:fixed;top:calc(-1 * var(--bg-overscan));left:0;width:100%;
            height:calc(var(--bg-height) + (var(--bg-overscan) * 2));
            min-height:110vh;z-index:5;pointer-events:none;
            transform:translate3d(0,0,0);backface-visibility:hidden;
        }
        #tsparticles {
            position:fixed;top:calc(-1 * var(--bg-overscan));left:0;width:100%;
            height:calc(var(--bg-height) + (var(--bg-overscan) * 2));
            min-height:110vh;z-index:2;pointer-events:none;
            mix-blend-mode:overlay;transform:translate3d(0,0,0);backface-visibility:hidden;
        }
        .particle {
            position:absolute;left:0;top:0;
            background:var(--particle-color);border-radius:50%;opacity:0;
            pointer-events:none;transform:translate3d(0,0,0);
            will-change:transform;contain:layout style;
        }
        :root.light-theme .particle { background:#000000; }

        @media(max-width:768px){
            :root{--grid-size:35px;}
            .sphere-1{width:70vw;height:70vw;filter:blur(30px);}
            .sphere-2{width:75vw;height:75vw;filter:blur(30px);}
            .sphere-3{width:55vw;height:55vw;filter:blur(25px);}
            .sphere-4{width:50vw;height:50vw;filter:blur(25px);}
        }

        /* ── Custom Cursor (exact match from index.html) ── */
        .custom-cursor {
            position:fixed;left:0;top:0;width:20px;height:20px;border-radius:50%;
            background:rgba(255,255,255,.6);pointer-events:none;
            z-index:2147483647!important;transform:translate(-50%,-50%);
            will-change:transform;
            transition:width .15s ease,height .15s ease,background .15s ease,box-shadow .15s ease;
            box-shadow:0 0 10px rgba(255,255,255,.5);contain:layout style;
        }
        .custom-cursor.cursor-hover {
            width:40px;height:40px;background:rgba(255,255,255,.6);
            box-shadow:0 0 15px rgba(255,255,255,1),0 0 30px rgba(255,255,255,.8),0 0 45px rgba(255,255,255,.6),0 0 60px rgba(255,255,255,.4);
        }
        .custom-cursor.cursor-click{width:15px;height:15px;background:rgba(255,255,255,1);}
        body.custom-cursor-active,
        body.custom-cursor-active a,
        body.custom-cursor-active button,
        body.custom-cursor-active input,
        body.custom-cursor-active textarea,
        body.custom-cursor-active select{cursor:none!important;}
        :root.light-theme .custom-cursor{background:rgba(0,0,0,.3);box-shadow:0 0 10px rgba(0,0,0,.1);}
        :root.light-theme .custom-cursor.cursor-hover{background:rgba(0,0,0,.1);box-shadow:0 0 15px rgba(0,0,0,.2),0 0 30px rgba(0,0,0,.1),0 0 45px rgba(0,0,0,.05);}
        :root.light-theme .custom-cursor.cursor-click{background:rgba(0,0,0,.5);}
        @media(max-width:768px),(hover:none),(pointer:coarse){.custom-cursor{display:none!important;}body.custom-cursor-active,body.custom-cursor-active *{cursor:auto!important;}}

        /* ── Content ── */
        .content-wrapper { position:relative;z-index:10; }

        .island {
            background:var(--island-bg);
            border:1px solid var(--island-border);
            border-radius:16px;
            padding:14px;
            margin:0 auto 2.5rem;
            max-width:1400px;
            box-shadow:var(--island-shadow);
            transition:transform .25s ease,box-shadow .25s ease,background-color .3s ease,border-color .3s ease;
            backdrop-filter:blur(6px);
        }
        .island:hover {
            transform:translateY(-6px);
            box-shadow:var(--island-shadow-hover);
        }
        .section-title {
            display:flex;
            align-items:center;
            justify-content:center;
            gap:8px;
            margin:0 0 1rem;
            text-align:center;
            font-size:1.25rem;
            font-weight:600;
        }
        .section-content-shell {
            background:var(--glass);
            backdrop-filter:var(--blur);
            border:1px solid var(--glass-border);
            border-radius:12px;
            padding:1rem;
            transition:background .3s,border-color .3s;
        }
        .section-content-shell:hover {
            background:var(--glass-hover);
            border-color:var(--border-hover);
        }

        /* ── Top Bar ── */
        .top-bar {
            position:fixed;top:0;left:0;right:0;z-index:100;
            padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;
            backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
            background:rgba(10,10,10,.6);border-bottom:1px solid rgba(255,255,255,.05);
            transition:background .3s,border-color .3s;
        }
        :root.light-theme .top-bar{background:rgba(255,255,255,.7);border-color:rgba(0,0,0,.08);}
        .back-btn {
            display:inline-flex;align-items:center;gap:.5rem;
            padding:.5rem 1rem;border-radius:10px;font-size:.85rem;font-weight:600;
            color:var(--text-color);background:var(--glass);border:1px solid var(--glass-border);
            backdrop-filter:var(--blur);text-decoration:none;
            transition:all .3s cubic-bezier(.34,1.56,.64,1);
        }
        .back-btn:hover{background:var(--glass-hover);border-color:var(--border-hover);transform:translateX(-4px);}
        .top-controls{display:flex;gap:.75rem;}
        .ctrl-btn {
            width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;
            background:var(--glass);border:1px solid var(--glass-border);
            backdrop-filter:var(--blur);color:var(--text-color);font-size:1rem;
            transition:all .3s;cursor:pointer;
        }
        .ctrl-btn:hover{background:var(--glass-hover);border-color:var(--border-hover);transform:scale(1.1);}

        /* ── Hero ── */
        .hero {
            padding:7rem 1.5rem 3rem;text-align:center;
            max-width:800px;margin:0 auto;
        }
        .portfolio-title {
            --title-cells:9;
            --portfolio-title-letter-shift-y:0px;
            width:min(calc(var(--grid-size) * var(--title-cells)),calc(100vw - 1rem));
            margin:0 auto;
            display:grid;
            grid-template-columns:repeat(var(--title-cells),minmax(0,1fr));
            grid-auto-rows:minmax(35px,var(--grid-size));
            font-size:calc(var(--grid-size) * .98);
            font-weight:900;
            line-height:1;
            color:#fff;
            letter-spacing:0;
            text-align:center;
            text-transform:uppercase;
        }
        .portfolio-title__letter {
            display:flex;
            align-items:center;
            justify-content:center;
            min-width:0;
            min-height:0;
            line-height:.82;
            color:#fff;
            text-shadow:0 0 18px rgba(255,255,255,.28);
            transform:translateY(var(--portfolio-title-letter-shift-y));
        }
        :root.light-theme .portfolio-title__letter {
            color:#0f172a;
            text-shadow:0 1px 10px rgba(255,255,255,.55);
        }
        .hero p {
            --hero-sub-shift-y:-3px;
            height:var(--grid-size);
            max-width:min(calc(var(--grid-size) * 9),calc(100vw - 1rem));
            margin:0 auto;
            display:flex;
            align-items:center;
            justify-content:center;
            color:rgba(255,255,255,.76);
            font-size:clamp(.75rem,calc(var(--grid-size) * .34),1.05rem);
            line-height:1.18;
            font-weight:400;
            text-align:center;
            transform:translateY(var(--hero-sub-shift-y));
        }
        :root.light-theme .hero p {
            color:#1e293b;
            font-weight:500;
            text-shadow:0 1px 12px rgba(255,255,255,.7);
        }

        /* ── Category Tabs ── */
        .category-tabs {
            --tab-cells:9;
            --portfolio-tabs-grid-shift-x:0px;
            --portfolio-tabs-grid-shift-y:0px;
            position:relative;
            left:var(--portfolio-tabs-grid-shift-x);
            top:var(--portfolio-tabs-grid-shift-y);
            width:min(calc(var(--grid-size) * var(--tab-cells)),calc(100vw - 1rem));
            display:grid;
            grid-template-columns:repeat(var(--tab-cells),minmax(0,1fr));
            grid-auto-rows:minmax(35px,var(--grid-size));
            gap:0;
            justify-content:center;
            padding:0;
            margin:0 auto 2.5rem;
        }
        .cat-tab {
            display:flex;
            align-items:center;
            justify-content:center;
            min-width:0;
            min-height:0;
            padding:.25rem;
            border:1px solid rgba(255,255,255,.18);
            border-radius:0;
            background:rgba(10,10,10,.24);
            backdrop-filter:var(--blur);
            color:rgba(255,255,255,.82);
            cursor:pointer;
            transition:background-color .25s,border-color .25s,color .25s,text-shadow .25s,transform .25s,box-shadow .25s;
            text-transform:uppercase;
            letter-spacing:0;
            font-size:clamp(.64rem,1.8vw,.8rem);
            font-weight:700;
            line-height:1;
            box-shadow:0 8px 22px rgba(0,0,0,.16);
        }
        .cat-tab[data-cell-span="1"]{grid-column:span 1;}
        .cat-tab[data-cell-span="2"]{grid-column:span 2;}
        .cat-tab[data-cell-span="3"]{grid-column:span 3;}
        .cat-tab:hover,.cat-tab.active{background:rgba(140,61,193,.32);border-color:rgba(255,255,255,.34);color:#fff;text-shadow:0 0 14px rgba(255,255,255,.36);box-shadow:0 10px 26px rgba(72,0,255,.18);}
        .cat-tab:hover{transform:translateY(-1px);}
        :root.light-theme .cat-tab{background:rgba(255,255,255,.58);border-color:rgba(15,23,42,.14);color:#0f172a;text-shadow:none;}
        :root.light-theme .cat-tab:hover,
        :root.light-theme .cat-tab.active{background:rgba(140,61,193,.16);border-color:rgba(72,0,255,.34);color:#0f172a;text-shadow:none;}

        /* ── Section Header ── */
        .section-header {
            max-width:1400px;margin:0 auto 1.5rem;padding:0 1.5rem;
            display:flex;align-items:center;justify-content:center;gap:1rem;
            text-align:center;
        }
        .section-header h2 {
            font-size:1.5rem;font-weight:800;letter-spacing:-.02em;
            display:flex;align-items:center;justify-content:center;gap:.5rem;
        }
        .section-header .line{display:none;}
        .section-num {
            font-size:.7rem;font-weight:800;color:var(--red);
            border:1px solid rgba(140,61,193,.3);padding:.15rem .6rem;border-radius:99px;
            letter-spacing:.1em;
        }

        /* ── Bento Grid ── */
        .bento-grid {
            margin:0;
            padding:0;
            display:grid;gap:var(--gap);
            grid-template-columns:1fr;
        }
        @media(min-width:768px){
            .bento-grid{grid-template-columns:repeat(2,1fr);}
            .col-span-2 { grid-column: span 2; }
        }

        /* ── Case Card (Glass) ── */
        .case-card {
            background:var(--island-bg);border:1px solid var(--island-border);
            border-radius:16px;overflow:hidden;
            box-shadow:var(--island-shadow);
            transition:transform .25s ease,box-shadow .25s ease,background-color .3s ease,border-color .3s ease;
            backdrop-filter:blur(6px);
            text-align:center;
        }
        .case-card:hover{transform:translateY(-6px);box-shadow:var(--island-shadow-hover);}
        .case-card-header {
            padding:1rem 1.25rem .75rem;display:flex;align-items:center;justify-content:center;gap:.75rem;
            text-align:center;
        }
        .case-icon {
            width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;
            background:rgba(140,61,193,.15);color:#8c3dc1;font-size:1rem;flex-shrink:0;
        }
        .case-title{font-weight:700;font-size:.95rem;line-height:1.3;text-align:center;}
        .case-subtitle{font-size:.7rem;color:var(--text-muted);margin-top:.1rem;text-align:center;}
        .case-body {
            padding:0 .75rem .75rem;
            text-align:center;
            display: flex;
            flex-direction: column;
            gap: var(--inner-gap);
        }
        .case-body > .img-wrap,
        .case-body > .source-card,
        .case-body > .ig-grid,
        .case-body > .hide-scroll,
        .case-body > .volunteer-grid,
        .case-body > .carousel-grid,
        .case-body > .case-image-grid-wrap,
        .case-body > .case-embed-grid,
        .case-body > .case-pdf-embed,
        .case-body > .case-link-grid,
        .case-body > .zaxid-stage-row {
            margin: 0 !important;
        }

        /* ── Source Badge ── */
        .source-badge {
            position:absolute;top:.75rem;left:.75rem;z-index:5;
            padding:.25rem .75rem;border-radius:99px;font-size:.65rem;font-weight:700;
            background:rgba(140,61,193,.85);color:#fff;

        /* ── Stickers Grid ── */

            grid-template-columns:repeat(3, minmax(0, 1fr));

    <!-- ── Particles System (from index.html) ── -->
    <script>
    (() => {
        const particlesContainer = document.getElementById('particles-container');
        if (!particlesContainer) return;
        const isMobileExperience = window.matchMedia('(max-width: 768px), (hover: none), (pointer: coarse)').matches;
        const supportsFineHover = !isMobileExperience && window.matchMedia('(hover: hover) and (pointer: fine)').matches;
        const AMBIENT_COUNT = 30;
        const TRAIL_POOL_SIZE = 20;
        const TRAIL_DURATION_MS = 1500;
        const TRAIL_MAX_PER_SEC = 60;
        const supportsWAAPI = typeof Element !== 'undefined' && typeof Element.prototype.animate === 'function';
        const moveEvent = window.PointerEvent ? 'pointermove' : 'mousemove';
        let trailOffsetX = 0, trailOffsetY = 0;
        function refreshTrailOffsets() {
            const rect = particlesContainer.getBoundingClientRect();
            trailOffsetX = -rect.left; trailOffsetY = -rect.top;
        }
        refreshTrailOffsets();
        window.addEventListener('resize', refreshTrailOffsets, { passive: true });
        function cancelAnimations(el) { const a = el.getAnimations?.(); if (a && a.length) a.forEach(x => x.cancel()); }
        const ambient = [];
        for (let i = 0; i < AMBIENT_COUNT; i++) {
            const p = document.createElement('div'); p.className = 'particle';
            const size = Math.random() * 3 + 1; p.style.width = p.style.height = size + 'px';
            particlesContainer.appendChild(p); ambient.push(p);
        }
        function animateAmbient(p) {
            const sX = Math.random()*100, sY = Math.random()*100;
            const eX = sX + (Math.random()*20-10), eY = sY - Math.random()*30;
            const dur = (Math.random()*10+10)*1000, delay = Math.random()*5000;
            const peak = Math.random()*.3+.1;
            if (supportsWAAPI) {
                cancelAnimations(p);
                const a = p.animate([{transform:`translate3d(${sX}vw,${sY}vh,0)`,opacity:0},{transform:`translate3d(${sX}vw,${sY}vh,0)`,opacity:peak,offset:.12},{transform:`translate3d(${eX}vw,${eY}vh,0)`,opacity:0}],{duration:dur,delay,easing:'linear',fill:'forwards'});
                a.onfinish = () => animateAmbient(p);
            } else {
                p.style.opacity='0';p.style.transition='none';p.style.transform=`translate3d(${sX}vw,${sY}vh,0)`;
                setTimeout(()=>{p.style.transition=`transform ${dur}ms linear,opacity ${dur}ms linear`;p.style.opacity=String(peak);p.style.transform=`translate3d(${eX}vw,${eY}vh,0)`;setTimeout(()=>animateAmbient(p),dur);},delay);
            }
        }
        ambient.forEach(animateAmbient);
        const trailPool = [];
        if (supportsFineHover) {
            for (let i = 0; i < TRAIL_POOL_SIZE; i++) {
                const p = document.createElement('div'); p.className = 'particle'; p.style.opacity = '0';
                particlesContainer.appendChild(p); trailPool.push(p);
            }
        }
        let trailIdx = 0;
        function spawnTrail(cx, cy) {
            if (!trailPool.length) return;
            const p = trailPool[trailIdx]; trailIdx = (trailIdx + 1) % trailPool.length;
            const size = Math.random()*4+2; p.style.width = p.style.height = size+'px';
            const cc = window.customCursorPos && window.customCursorPos.color;
            if (cc) { p.style.backgroundColor = cc; p.style.boxShadow = `0 0 10px ${cc}`; } else { p.style.backgroundColor=''; p.style.boxShadow=''; }
            const x = cx+trailOffsetX, y = cy+trailOffsetY;
            const dX = (Math.random()-.5)*80, dY = (Math.random()-.5)*80;
            if (supportsWAAPI) {
                cancelAnimations(p);
                p.animate([{transform:`translate3d(${x}px,${y}px,0)`,opacity:.6},{transform:`translate3d(${x+dX}px,${y+dY}px,0)`,opacity:0}],{duration:TRAIL_DURATION_MS,easing:'ease-out',fill:'forwards'});
            } else {
                p.style.transition='none';p.style.opacity='.6';p.style.transform=`translate3d(${x}px,${y}px,0)`;
                setTimeout(()=>{p.style.transition=`transform ${TRAIL_DURATION_MS}ms ease-out,opacity ${TRAIL_DURATION_MS}ms ease-out`;p.style.opacity='0';p.style.transform=`translate3d(${x+dX}px,${y+dY}px,0)`;},0);
            }
        }
        let lastX=innerWidth*.5,lastY=innerHeight*.5,rafPending=false,lastTrailTime=0;
        function tick(){rafPending=false;const now=performance.now();if(now-lastTrailTime>=(1000/TRAIL_MAX_PER_SEC)){spawnTrail(lastX,lastY);lastTrailTime=now;}}
        function onMove(e){if(e.pointerType&&e.pointerType!=='mouse')return;lastX=e.clientX;lastY=e.clientY;if(!rafPending){rafPending=true;requestAnimationFrame(tick);}}
        if (supportsFineHover) {
            document.addEventListener(moveEvent, onMove, { passive: true });
        }
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) { ambient.forEach(cancelAnimations); trailPool.forEach(cancelAnimations); } else { ambient.forEach(animateAmbient); }
        });
    })();
    </script>

    <script>

                    number: { value: 25, density: { enable: true, area: 900 } },
                    size: { value: { min: 3, max: 6 } },
                    opacity: { value: 0.9 }
                },
                interactivity: { detectsOn: 'canvas', events: { onHover: { enable: false }, onClick: { enable: false } } },
                detectRetina: false
            });
        }

        if (typeof tsParticles !== 'undefined') {
            startParticles();
        } else {
            window.addEventListener('load', startParticles, { once: true });
        }
    })();
