<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>Saber Pad</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="icon" href="../../../fav/favicon.ico">
    <link rel="stylesheet" href="../css/beat-saber.css">
    <script type="module" src="../js/pad.js"></script>
</head>

<body class="bs-pad-body">
    <main class="bs-pad-page">
        <section class="bs-pad-stage" aria-label="Saber pad">
            <div class="bs-pad-reticle" id="padReticle"></div>
            <div class="bs-pad-grid"></div>
        </section>

        <section class="bs-pad-ui">
            <div class="bs-pad-topline">
                <span id="padStatus" data-mode="idle">Waiting</span>
                <strong id="padRoomCode">----</strong>
            </div>

            <form class="bs-pad-code" id="codeForm">
                <input id="roomInput" inputmode="numeric" autocomplete="one-time-code" maxlength="4" placeholder="0000">
                <button id="connectButton" type="submit">Connect</button>
            </form>

            <div class="bs-pad-hands" role="group" aria-label="Hand">
                <button type="button" data-hand="left">Left</button>
                <button type="button" data-hand="right">Right</button>
            </div>

            <button class="bs-pad-calibrate" id="calibrateButton" type="button">
                Calibrate
            </button>

            <div class="bs-pad-stats">
                <span>Score <strong id="padScore">0</strong></span>
                <span>Combo <strong id="padCombo">0x</strong></span>
            </div>
        </section>
    </main>
</body>

</html>
