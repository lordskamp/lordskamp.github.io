<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#02040a">
    <title>OneSaber Controller</title>
    <link rel="icon" href="../../../fav/favicon.ico">
    <link rel="stylesheet" href="pad.css">
    <script type="module" src="webxr-saber-pad.js"></script>
</head>

<body>
    <main class="pad-shell">
        <section class="pad-saber" aria-hidden="true">
            <div class="pad-saber__blade"></div>
            <div class="pad-saber__guard"></div>
            <div class="pad-saber__hilt"></div>
        </section>

        <section class="pad-ui" aria-label="OneSaber controller">
            <div class="pad-status">
                <span id="trackingState">Очікування</span>
                <strong id="roomLabel">----</strong>
            </div>

            <label class="pad-field">
                <span>Кімната</span>
                <input id="roomInput" inputmode="numeric" maxlength="8" autocomplete="one-time-code" placeholder="0000">
            </label>

            <label class="pad-field">
                <span>Канал</span>
                <input id="serverInput" inputmode="url" autocomplete="url" placeholder="wss://localhost:3001 або https://server">
            </label>

            <button class="pad-start" id="startSaberButton" type="button">Запустити меч</button>
            <button class="pad-stop" id="stopSaberButton" type="button" disabled>Зупинити</button>

            <dl class="pad-readout">
                <div>
                    <dt>X</dt>
                    <dd id="posX">0.00</dd>
                </div>
                <div>
                    <dt>Y</dt>
                    <dd id="posY">0.00</dd>
                </div>
                <div>
                    <dt>Z</dt>
                    <dd id="posZ">0.00</dd>
                </div>
                <div>
                    <dt>Hz</dt>
                    <dd id="frameRate">0</dd>
                </div>
            </dl>
        </section>
    </main>
</body>

</html>
