<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#05070d">
    <title>Lordskamp | Saber Side Project</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" href="../../fav/favicon.ico">
    <link rel="stylesheet" href="css/beat-saber.css">
    <script defer src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script type="module" src="js/main.js"></script>
</head>

<body class="bs-body">
    <div class="bs-page">
        <main class="bs-game-shell">
            <section class="bs-scene" id="bsScene" aria-label="Saber game scene">
                <div class="bs-swing-flash" id="swingFlash"></div>
            </section>

            <header class="bs-hud bs-hud--top">
                <a class="bs-icon-link" href="../../index.html" aria-label="Back">
                    <i class="fas fa-arrow-left" aria-hidden="true"></i>
                </a>
                <div class="bs-status-pill" id="connectionStatus" data-mode="idle">Loading</div>
                <div class="bs-room-chip">
                    <span>Room</span>
                    <strong id="roomCode">----</strong>
                </div>
            </header>

            <aside class="bs-panel bs-panel--lobby" aria-label="Lobby">
                <div class="bs-panel__header">
                    <div>
                        <p class="bs-kicker">Side Project</p>
                        <h1>Saber Pad</h1>
                    </div>
                    <button class="bs-icon-button" id="stopButton" type="button" aria-label="Stop">
                        <i class="fas fa-stop" aria-hidden="true"></i>
                    </button>
                </div>

                <div class="bs-selected-track">
                    <img id="selectedCover" alt="" hidden>
                    <div>
                        <h2 id="selectedTitle">Loading track</h2>
                        <p id="selectedMeta">--</p>
                        <span id="noteCount">No notes loaded</span>
                    </div>
                </div>

                <label class="bs-field">
                    <span>Difficulty</span>
                    <select id="difficultySelect"></select>
                </label>

                <div class="bs-track-list" id="trackList"></div>

                <label class="bs-drop-zone" id="dropZone">
                    <input id="zipInput" type="file" accept=".zip,application/zip">
                    <i class="fas fa-file-zipper" aria-hidden="true"></i>
                    <span>Drop Beat Saber ZIP</span>
                </label>

                <div class="bs-controls">
                    <button class="bs-command bs-command--primary" id="startButton" type="button">
                        <i class="fas fa-play" aria-hidden="true"></i>
                        <span>Play</span>
                    </button>
                    <button class="bs-command" id="pauseButton" type="button">
                        <i class="fas fa-pause" aria-hidden="true"></i>
                        <span>Pause</span>
                    </button>
                </div>
            </aside>

            <aside class="bs-panel bs-panel--pairing" aria-label="Pair phone">
                <canvas id="qrCanvas" width="180" height="180" aria-label="Controller QR code"></canvas>
                <a id="padLink" href="pad/">pad/</a>
            </aside>

            <footer class="bs-hud bs-hud--bottom">
                <div class="bs-stat">
                    <span>Score</span>
                    <strong id="scoreValue">0</strong>
                </div>
                <div class="bs-stat">
                    <span>Combo</span>
                    <strong id="comboValue">0x</strong>
                </div>
                <div class="bs-stat">
                    <span>Acc</span>
                    <strong id="accuracyValue">0%</strong>
                </div>
                <div class="bs-stat">
                    <span>Time</span>
                    <strong id="timeValue">0:00 / 0:00</strong>
                </div>
            </footer>
        </main>
    </div>
</body>

</html>
