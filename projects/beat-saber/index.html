<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#05070d">
    <title>OneSaber Side Project</title>
    <link rel="icon" href="../../fav/favicon.ico">
    <link rel="stylesheet" href="desktop.css">
    <script defer src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script type="module" src="src/main.js"></script>
</head>

<body>
    <main class="game-shell" data-state="loading">
        <section class="scene" id="scene" aria-label="OneSaber playfield"></section>

        <header class="hud hud-top">
            <a class="icon-link" href="../../index.html" aria-label="Назад">←</a>
            <div class="status-pill" id="connectionStatus">Завантаження</div>
            <div class="room-chip">
                <span>Room</span>
                <strong id="roomCode">----</strong>
            </div>
        </header>

        <aside class="panel panel-library" aria-label="Track controls">
            <div class="track-identity">
                <img id="coverImage" alt="" hidden>
                <div>
                    <p>Beat Saber</p>
                    <h1 id="trackTitle">OneSaber</h1>
                    <span id="trackMeta">Beat Saber map</span>
                </div>
            </div>

            <div class="controls-row">
                <select id="difficultySelect" aria-label="Складність"></select>
                <button id="loadBuiltInButton" type="button">хлопчик</button>
            </div>

            <label class="drop-zone" id="dropZone">
                <input id="zipInput" type="file" accept=".zip,application/zip">
                <span>Drop Beat Saber ZIP</span>
            </label>

            <div class="transport-fields">
                <label>
                    <span>Room</span>
                    <input id="roomInput" inputmode="numeric" maxlength="8" autocomplete="one-time-code">
                </label>
                <label>
                    <span>Relay</span>
                    <input id="serverInput" inputmode="url" autocomplete="url" placeholder="wss://relay або https://socket.io">
                </label>
            </div>

            <div class="controls-row">
                <button class="primary-command" id="playButton" type="button">Play</button>
                <button id="pauseButton" type="button">Pause</button>
                <button id="recenterButton" type="button">Center</button>
            </div>
        </aside>

        <aside class="panel panel-pair" aria-label="Pair mobile controller">
            <canvas id="qrCanvas" width="176" height="176"></canvas>
            <a id="padLink" href="pad/">pad/</a>
        </aside>

        <footer class="hud hud-bottom">
            <div>
                <span>Score</span>
                <strong id="scoreValue">0</strong>
            </div>
            <div>
                <span>Combo</span>
                <strong id="comboValue">0x</strong>
            </div>
            <div>
                <span>Acc</span>
                <strong id="accuracyValue">0%</strong>
            </div>
            <div>
                <span>Time</span>
                <strong id="timeValue">0:00</strong>
            </div>
        </footer>
    </main>
</body>

</html>
