name = "kobza-leaderboard"
main = "api/kobza-leaderboard-worker.js"
compatibility_date = "2026-07-14"

# Використовується вже наявний KV namespace. Окрема база не потрібна.
[[kv_namespaces]]
binding = "KOBZA_LEADERBOARD"
id = "<EXISTING_KV_NAMESPACE_ID>"

[vars]
SHYFR_MINI_APP_URL = "https://lordskamp.github.io/shyfr/"
SHYFR_PAYMENT_SUPPORT = "@replace_with_support_username"
SHYFR_DAILY_LIVES = "4"
SHYFR_DAILY_HINTS = "3"
SHYFR_CATEGORY_PRICE_STARS = "200"
SHYFR_LEVEL_PRICE_STARS = "10"
SHYFR_LIVES_PACK_STARS = "30"
SHYFR_HINTS_PACK_QUANTITY = "5"
SHYFR_HINTS_PACK_STARS = "20"
